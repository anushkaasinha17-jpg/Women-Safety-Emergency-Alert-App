<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="hdr3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f43f6e"/><stop offset="100%" style="stop-color:#f97fb0"/>
    </linearGradient>
    <marker id="ar2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b5708a"/>
    </marker>
  </defs>
  <rect width="900" height="500" fill="#fff5f7"/>
  <rect width="900" height="50" fill="url(#hdr3)"/>
  <text x="450" y="32" text-anchor="middle" fill="white" font-size="17" font-weight="700">DFD Level 0 – Context Diagram – SafeHer</text>

  <!-- Central process -->
  <circle cx="450" cy="260" r="115" fill="white" stroke="#f43f6e" stroke-width="3"/>
  <circle cx="450" cy="260" r="108" fill="#fff5f7" stroke="#fda4af" stroke-width="1"/>
  <text x="450" y="252" text-anchor="middle" fill="#f43f6e" font-size="16" font-weight="700">SafeHer</text>
  <text x="450" y="272" text-anchor="middle" fill="#b5708a" font-size="12">Emergency Safety</text>
  <text x="450" y="290" text-anchor="middle" fill="#b5708a" font-size="12">Alert System</text>

  <!-- External entities -->
  <rect x="20" y="200" width="150" height="50" rx="10" fill="white" stroke="#f43f6e" stroke-width="2"/>
  <text x="95" y="229" text-anchor="middle" fill="#f43f6e" font-size="12" font-weight="700">Woman User</text>

  <rect x="730" y="200" width="150" height="50" rx="10" fill="white" stroke="#d4967e" stroke-width="2"/>
  <text x="805" y="229" text-anchor="middle" fill="#d4967e" font-size="12" font-weight="700">Admin / Authority</text>

  <rect x="190" y="420" width="160" height="50" rx="10" fill="white" stroke="#c084fc" stroke-width="2"/>
  <text x="270" y="449" text-anchor="middle" fill="#c084fc" font-size="12" font-weight="700">Trusted Contacts</text>

  <rect x="550" y="420" width="160" height="50" rx="10" fill="white" stroke="#6ee7b7" stroke-width="2"/>
  <text x="630" y="449" text-anchor="middle" fill="#059669" font-size="12" font-weight="700">SMS / Push Service</text>

  <rect x="390" y="68" width="120" height="50" rx="10" fill="white" stroke="#fb923c" stroke-width="2"/>
  <text x="450" y="91" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="700">GPS / Maps API</text>
  <text x="450" y="107" text-anchor="middle" fill="#b5708a" font-size="10">Google Maps</text>

  <!-- Arrows -->
  <!-- User → System -->
  <line x1="170" y1="215" x2="336" y2="238" stroke="#f43f6e" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="245" y="210" text-anchor="middle" fill="#7c3d5a" font-size="10">OTP login</text>
  <text x="248" y="222" text-anchor="middle" fill="#7c3d5a" font-size="10">SOS trigger</text>

  <!-- System → User -->
  <line x1="336" y1="256" x2="170" y2="240" stroke="#f43f6e" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="240" y="258" text-anchor="middle" fill="#7c3d5a" font-size="10">Confirmation</text>
  <text x="240" y="270" text-anchor="middle" fill="#7c3d5a" font-size="10">Alert status</text>

  <!-- Admin → System -->
  <line x1="730" y1="218" x2="564" y2="238" stroke="#d4967e" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="648" y="212" text-anchor="middle" fill="#7c3d5a" font-size="10">Zone configs</text>

  <!-- System → Admin -->
  <line x1="564" y1="255" x2="730" y2="240" stroke="#d4967e" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="648" y="262" text-anchor="middle" fill="#7c3d5a" font-size="10">Reports, analytics</text>

  <!-- Trusted Contact ← System -->
  <line x1="395" y1="372" x2="340" y2="420" stroke="#c084fc" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="340" y="405" text-anchor="middle" fill="#7c3d5a" font-size="10">SOS alert + location</text>

  <!-- Trusted Contact → System -->
  <line x1="345" y1="420" x2="400" y2="375" stroke="#c084fc" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="348" y="388" text-anchor="middle" fill="#7c3d5a" font-size="10">Ack / Track</text>

  <!-- System → SMS service -->
  <line x1="505" y1="372" x2="560" y2="420" stroke="#6ee7b7" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="558" y="400" text-anchor="middle" fill="#7c3d5a" font-size="10">Send SMS/push</text>

  <!-- GPS → System -->
  <line x1="450" y1="118" x2="450" y2="146" stroke="#fb923c" stroke-width="1.5" marker-end="url(#ar2)"/>
  <text x="475" y="136" fill="#7c3d5a" font-size="10">GPS coords</text>
</svg>
