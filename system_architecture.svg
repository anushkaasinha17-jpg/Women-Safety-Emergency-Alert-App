  <line x1="460" y1="218" x2="460" y2="254" stroke="#fda4af" stroke-width="1" stroke-dasharray="4"/>
  <line x1="460" y1="344" x2="460" y2="364" stroke="#fda4af" stroke-width="1" stroke-dasharray="4"/>
