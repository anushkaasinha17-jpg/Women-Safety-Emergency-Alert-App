  <rect x="220" y="480" width="120" height="36" rx="9" fill="white" stroke="#fb923c" stroke-width="1.5"/>
  <text x="280" y="502" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">GitHub CI/CD</text>
