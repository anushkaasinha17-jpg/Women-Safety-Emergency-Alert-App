<svg viewBox="0 0 920 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="hdr5" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f43f6e"/><stop offset="100%" style="stop-color:#f97fb0"/>
    </linearGradient>
  </defs>
  <rect width="920" height="540" fill="#fff5f7"/>
  <rect width="920" height="50" fill="url(#hdr5)"/>
