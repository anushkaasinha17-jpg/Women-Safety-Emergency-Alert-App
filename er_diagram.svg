<svg viewBox="0 0 960 580" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="hdr2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f43f6e"/>
      <stop offset="100%" style="stop-color:#f97fb0"/>
    </linearGradient>
  </defs>
  <rect width="960" height="580" fill="#fff5f7"/>
  <rect width="960" height="50" fill="url(#hdr2)"/>
  <text x="480" y="32" text-anchor="middle" fill="white" font-size="17" font-weight="700">Entity-Relationship Diagram – SafeHer App</text>

  <!-- USER -->
  <rect x="20" y="80" width="170" height="220" rx="12" fill="white" stroke="#f43f6e" stroke-width="2"/>
  <rect x="20" y="80" width="170" height="38" rx="12" fill="#f43f6e"/>
  <text x="105" y="105" text-anchor="middle" fill="white" font-size="13" font-weight="700">USER</text>
  <line x1="20" y1="118" x2="190" y2="118" stroke="#fce7ef" stroke-width="1"/>
  <text x="38" y="140" fill="#b5708a" font-size="11">🔑 user_id (PK)</text>
  <text x="38" y="158" fill="#3d1a2e" font-size="11">  name</text>
  <text x="38" y="176" fill="#3d1a2e" font-size="11">  phone_number</text>
  <text x="38" y="194" fill="#3d1a2e" font-size="11">  email</text>
  <text x="38" y="212" fill="#3d1a2e" font-size="11">  gender</text>
  <text x="38" y="230" fill="#3d1a2e" font-size="11">  role</text>
  <text x="38" y="248" fill="#3d1a2e" font-size="11">  profile_photo</text>
  <text x="38" y="266" fill="#3d1a2e" font-size="11">  sos_message</text>
  <text x="38" y="284" fill="#3d1a2e" font-size="11">  created_at</text>

  <!-- SOS_ALERT -->
  <rect x="380" y="60" width="200" height="250" rx="12" fill="white" stroke="#f43f6e" stroke-width="2.5"/>
  <rect x="380" y="60" width="200" height="38" rx="12" fill="#c2185b"/>
  <text x="480" y="85" text-anchor="middle" fill="white" font-size="13" font-weight="700">SOS_ALERT</text>
  <line x1="380" y1="98" x2="580" y2="98" stroke="#fce7ef" stroke-width="1"/>
  <text x="398" y="120" fill="#b5708a" font-size="11">🔑 alert_id (PK)</text>
  <text x="398" y="138" fill="#3d1a2e" font-size="11">  user_id (FK)</text>
  <text x="398" y="156" fill="#3d1a2e" font-size="11">  triggered_at</text>
  <text x="398" y="174" fill="#3d1a2e" font-size="11">  latitude</text>
  <text x="398" y="192" fill="#3d1a2e" font-size="11">  longitude</text>
  <text x="398" y="210" fill="#3d1a2e" font-size="11">  status (active/resolved)</text>
  <text x="398" y="228" fill="#3d1a2e" font-size="11">  audio_url</text>
  <text x="398" y="246" fill="#3d1a2e" font-size="11">  resolved_at</text>
  <text x="398" y="264" fill="#3d1a2e" font-size="11">  location_trail (JSON)</text>
  <text x="398" y="282" fill="#3d1a2e" font-size="11">  notes</text>

  <!-- TRUSTED_CONTACT -->
  <rect x="740" y="80" width="185" height="200" rx="12" fill="white" stroke="#c084fc" stroke-width="2"/>
  <rect x="740" y="80" width="185" height="38" rx="12" fill="#c084fc"/>
  <text x="832" y="105" text-anchor="middle" fill="white" font-size="13" font-weight="700">TRUSTED_CONTACT</text>
  <line x1="740" y1="118" x2="925" y2="118" stroke="#f3e8ff" stroke-width="1"/>
  <text x="758" y="140" fill="#b5708a" font-size="11">🔑 contact_id (PK)</text>
  <text x="758" y="158" fill="#3d1a2e" font-size="11">  user_id (FK)</text>
  <text x="758" y="176" fill="#3d1a2e" font-size="11">  contact_name</text>
  <text x="758" y="194" fill="#3d1a2e" font-size="11">  contact_phone</text>
  <text x="758" y="212" fill="#3d1a2e" font-size="11">  relation</text>
  <text x="758" y="230" fill="#3d1a2e" font-size="11">  is_notified</text>
  <text x="758" y="248" fill="#3d1a2e" font-size="11">  added_at</text>
  <text x="758" y="266" fill="#3d1a2e" font-size="11">  notify_sms</text>

  <!-- NOTIFICATION -->
  <rect x="740" y="360" width="185" height="180" rx="12" fill="white" stroke="#fb923c" stroke-width="2"/>
  <rect x="740" y="360" width="185" height="38" rx="12" fill="#fb923c"/>
  <text x="832" y="385" text-anchor="middle" fill="white" font-size="13" font-weight="700">NOTIFICATION</text>
  <line x1="740" y1="398" x2="925" y2="398" stroke="#ffedd5" stroke-width="1"/>
  <text x="758" y="420" fill="#b5708a" font-size="11">🔑 notif_id (PK)</text>
  <text x="758" y="438" fill="#3d1a2e" font-size="11">  alert_id (FK)</text>
  <text x="758" y="456" fill="#3d1a2e" font-size="11">  contact_id (FK)</text>
  <text x="758" y="474" fill="#3d1a2e" font-size="11">  channel (SMS/push)</text>
  <text x="758" y="492" fill="#3d1a2e" font-size="11">  delivered_at</text>
  <text x="758" y="510" fill="#3d1a2e" font-size="11">  status</text>
  <text x="758" y="528" fill="#3d1a2e" font-size="11">  message_text</text>

  <!-- CHECKIN -->
  <rect x="20" y="380" width="170" height="170" rx="12" fill="white" stroke="#6ee7b7" stroke-width="2"/>
  <rect x="20" y="380" width="170" height="38" rx="12" fill="#6ee7b7"/>
  <text x="105" y="405" text-anchor="middle" fill="#0d4430" font-size="13" font-weight="700">CHECK_IN</text>
  <line x1="20" y1="418" x2="190" y2="418" stroke="#d1fae5" stroke-width="1"/>
  <text x="38" y="440" fill="#b5708a" font-size="11">🔑 checkin_id (PK)</text>
  <text x="38" y="458" fill="#3d1a2e" font-size="11">  user_id (FK)</text>
  <text x="38" y="476" fill="#3d1a2e" font-size="11">  schedule_time</text>
  <text x="38" y="494" fill="#3d1a2e" font-size="11">  confirmed_at</text>
  <text x="38" y="512" fill="#3d1a2e" font-size="11">  auto_sos_triggered</text>
  <text x="38" y="530" fill="#3d1a2e" font-size="11">  status</text>

  <!-- Relationship lines -->
  <line x1="190" y1="175" x2="380" y2="175" stroke="#f43f6e" stroke-width="1.5" stroke-dasharray="6"/>
  <text x="285" y="165" text-anchor="middle" fill="#f43f6e" font-size="11">triggers (1:N)</text>

  <line x1="580" y1="175" x2="740" y2="175" stroke="#c084fc" stroke-width="1.5" stroke-dasharray="6"/>
  <text x="660" y="165" text-anchor="middle" fill="#c084fc" font-size="11">notifies (1:N)</text>

  <line x1="832" y1="280" x2="832" y2="360" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6"/>
  <text x="848" y="325" fill="#fb923c" font-size="11">sends (1:N)</text>

  <line x1="480" y1="310" x2="480" y2="450" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6"/>
  <line x1="480" y1="450" x2="740" y2="450" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6"/>
  <text x="600" y="440" text-anchor="middle" fill="#fb923c" font-size="11">generates (1:N)</text>

  <line x1="105" y1="300" x2="105" y2="380" stroke="#6ee7b7" stroke-width="1.5" stroke-dasharray="6"/>
  <text x="118" y="345" fill="#6ee7b7" font-size="11">sets (1:N)</text>
</svg>
